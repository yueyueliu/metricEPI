# Model configuration
model:
  hidden_dim: 128
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  max_distance: 1000000  # 1Mb
  use_contrastive: true

# Training configuration
training:
  batch_size: 32
  epochs: 100
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  patience: 15
  scheduler: "cosine"
  seed: 42

# Loss configuration
loss:
  bce_weight: 0.7
  contrastive_weight: 0.3

# Data configuration
data:
  val_split: 0.2
  cache_size: 2
  num_workers: 2

# Output configuration
output:
  save_dir: "./outputs"
  save_every: 10
